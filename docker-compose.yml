name: arrdocker

services:
  # ── VPN Gateway ──────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRY:-Netherlands}
      - HTTPPROXY=on
      - HTTPPROXY_LISTENING_ADDRESS=:8888
      - HTTP_CONTROL_SERVER_AUTH=false
      - TZ=${TZ}
    ports:
      # Sonarr
      - "8989:8989"
      # Radarr
      - "7878:7878"
      # Prowlarr
      - "9696:9696"
      # SABnzbd
      - "8080:8080"
      # Gluetun HTTP proxy (used by vpn-exporter for IP verification)
      - "8888:8888"
      # Gluetun control API (used by vpn-exporter for VPN status)
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=10", "http://127.0.0.1:9999/"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - ./arrdrive/config/gluetun:/gluetun
    restart: unless-stopped
